services:

  # ── Backend (Node.js / Express) ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sendix-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    expose:
      - "3001"
    networks:
      - sendix_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend (Vite build → nginx) ─────────────────────────────────────────
  # .env from sendix-frontend/frontend/.env is copied into the build context
  # so Vite can read VITE_* vars during npm run build — no extra env file needed.
  frontend:
    build:
      context: ../sendix-frontend/frontend
      dockerfile: Dockerfile
    container_name: sendix-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sendix_net

networks:
  sendix_net:
    driver: bridge
